<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Profile — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--dark2:#12121a;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;--success:#4dff91;--error:#ff4d4d;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:60px;}

/* NAV */
.topnav{position:sticky;top:0;z-index:100;padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);}
.logo{display:flex;align-items:center;gap:.5rem;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;-webkit-text-fill-color:initial;font-size:.8rem;}
.nav-links{display:flex;gap:.2rem;}
.nav-link{padding:.38rem .7rem;border-radius:50px;font-size:.8rem;text-decoration:none;color:var(--muted);}
.nav-link.active{color:var(--pink);}

/* PAGE */
.page{max-width:800px;margin:0 auto;padding:1.2rem 1rem;}

/* COVER */
.cover-wrap{position:relative;height:170px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,rgba(255,107,157,.35),rgba(168,85,247,.35));cursor:pointer;margin-bottom:58px;}
.cover-img{width:100%;height:100%;object-fit:cover;display:none;}
.cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:.3s;}
.cover-wrap:hover .cover-overlay{opacity:1;}
.cover-overlay span{color:#fff;font-size:.82rem;font-weight:600;background:rgba(0,0,0,.4);padding:.3rem .7rem;border-radius:50px;}
.avatar-area{position:absolute;bottom:-46px;left:1.2rem;}
.avatar{width:90px;height:90px;border-radius:50%;border:4px solid var(--dark);background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;cursor:pointer;position:relative;}
.avatar img{width:100%;height:100%;object-fit:cover;display:none;}
.avatar-edit-hint{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;font-size:1rem;border-radius:50%;}
.avatar:hover .avatar-edit-hint{display:flex;}

/* PROFILE INFO */
.profile-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.8rem;}
.profile-left h1{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-bottom:.15rem;}
.handle{color:var(--muted);font-size:.83rem;margin-bottom:.35rem;}
.bio-text{font-size:.88rem;line-height:1.6;color:var(--text);max-width:420px;margin-bottom:.6rem;}
/* Stats - CLICKABLE */
.stats-row{display:flex;gap:1.2rem;margin-top:.4rem;}
.stat-btn{text-align:center;cursor:pointer;padding:.3rem .5rem;border-radius:8px;transition:.15s;background:none;border:none;color:var(--text);}
.stat-btn:hover{background:rgba(255,107,157,.08);}
.stat-btn .num{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;display:block;}
.stat-btn .lbl{font-size:.72rem;color:var(--muted);display:block;}
.profile-btns{display:flex;gap:.6rem;flex-wrap:wrap;}
.btn{padding:.6rem 1.2rem;border-radius:50px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:.2s;display:flex;align-items:center;gap:.35rem;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(255,107,157,.3);}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);}
.btn-ghost:hover{border-color:var(--pink);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:1.1rem;}
.tab{flex:1;padding:.7rem;font-size:.84rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;text-align:center;transition:.2s;}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);}

/* POSTS GRID */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.p-thumb{aspect-ratio:1;border-radius:4px;overflow:hidden;cursor:pointer;background:var(--card);position:relative;}
.p-thumb img,.p-thumb video{width:100%;height:100%;object-fit:cover;}
.p-thumb .reel-icon{position:absolute;top:5px;right:5px;font-size:.75rem;}
.p-thumb .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;gap:.8rem;font-size:.8rem;color:#fff;}
.p-thumb:hover .overlay{display:flex;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1;}
.empty-state .icon{font-size:2.5rem;margin-bottom:.7rem;}

/* EDIT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
@media(min-width:600px){.modal-bg{align-items:center;}}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:1.4rem;}
@media(min-width:600px){.modal{border-radius:20px;}}
.drag{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto .9rem;}
.modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:1.1rem;}
.fg{margin-bottom:1rem;}
.fl{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.38rem;}
input[type=text],input[type=tel],input[type=date],input[type=url],textarea,select{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:.75rem 1rem;color:var(--text);font-size:.88rem;
  font-family:'DM Sans',sans-serif;outline:none;transition:.2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--pink);}
input::placeholder,textarea::placeholder{color:var(--muted);}
textarea{resize:vertical;min-height:75px;}
select option{background:var(--dark2);}
.char-c{text-align:right;font-size:.72rem;color:var(--muted);margin-top:.22rem;}
.macts{display:flex;gap:.7rem;margin-top:1.1rem;}
.mbtn{flex:1;padding:.8rem;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;}
.mbp{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.mbg{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);}
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.83rem;margin-bottom:.8rem;display:none;}
.alert.s{background:rgba(77,255,145,.1);border:1px solid rgba(77,255,145,.3);color:var(--success);}
.alert.e{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:var(--error);}

/* FOLLOWERS/FOLLOWING MODAL */
.fol-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:600;display:none;align-items:flex-end;justify-content:center;}
.fol-modal-bg.open{display:flex;}
@media(min-width:600px){.fol-modal-bg{align-items:center;}}
.fol-modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:420px;max-height:85vh;display:flex;flex-direction:column;}
@media(min-width:600px){.fol-modal{border-radius:20px;}}
.fol-header{padding:1rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.fol-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;}
.fol-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
.fol-search{padding:.7rem 1rem;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.fol-search input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:50px;padding:.5rem 1rem;color:var(--text);font-size:.85rem;outline:none;font-family:'DM Sans',sans-serif;}
.fol-search input:focus{border-color:var(--pink);}
.fol-list{flex:1;overflow-y:auto;}
.fol-item{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.03);transition:.15s;}
.fol-item:active{background:rgba(255,107,157,.07);}
.fol-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;cursor:pointer;}
.fol-av img{width:100%;height:100%;object-fit:cover;}
.fol-info{flex:1;min-width:0;cursor:pointer;}
.fol-name{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fol-handle{font-size:.75rem;color:var(--muted);}
.fol-action{display:flex;gap:.4rem;flex-shrink:0;}
.fol-btn{padding:.28rem .75rem;border-radius:50px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;transition:.2s;white-space:nowrap;}
.fol-btn.unfollow{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.1);}
.fol-btn.unfollow:hover{border-color:var(--error);color:var(--error);}
.fol-btn.follow{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.fol-btn.msg{background:rgba(255,107,157,.1);border:1px solid rgba(255,107,157,.2);color:var(--pink);}

/* SPINNER */
.spin{width:32px;height:32px;border:3px solid rgba(255,107,157,.2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.mspin{width:16px;height:16px;border:2px solid rgba(255,107,157,.2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;}
.ls{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999;}
#coverInp,#avatarInp{display:none;}
</style>
</head>
<body>
<div class="ls" id="ls"><div class="spin"></div></div>

<nav class="topnav">
  <a href="index.html" class="logo"><div class="logo-icon">🌸</div>AI Sweety</a>
  <div class="nav-links">
    <a href="chat.html" class="nav-link">💬 Chat</a>
    <a href="social.html" class="nav-link">📸 Social</a>
    <a href="profile.html" class="nav-link active">👤 Profile</a>
  </div>
</nav>

<div class="page">
  <!-- COVER -->
  <div class="cover-wrap" id="coverWrap" onclick="document.getElementById('coverInp').click()">
    <img id="coverImg" src="" alt="Cover"/>
    <div class="cover-overlay"><span>📷 Change Cover</span></div>
    <div class="avatar-area">
      <div class="avatar" id="avatarEl" onclick="event.stopPropagation();document.getElementById('avatarInp').click()">
        <span id="avatarEmoji">🌸</span>
        <img id="avatarImg" src="" alt="Avatar"/>
        <div class="avatar-edit-hint">📷</div>
      </div>
    </div>
  </div>
  <input type="file" id="coverInp" accept="image/*" onchange="uploadMedia(this,'cover')"/>
  <input type="file" id="avatarInp" accept="image/*" onchange="uploadMedia(this,'avatar')"/>

  <!-- PROFILE HEADER -->
  <div class="profile-header">
    <div class="profile-left">
      <h1 id="profileName">Loading...</h1>
      <div class="handle" id="profileHandle">@user</div>
      <div class="bio-text" id="profileBio">No bio yet. Click Edit Profile to add one.</div>
      <div class="stats-row">
        <button class="stat-btn" onclick="openFolModal('posts')">
          <span class="num" id="statPosts">0</span>
          <span class="lbl">Posts</span>
        </button>
        <button class="stat-btn" onclick="openFolModal('followers')">
          <span class="num" id="statFollowers">0</span>
          <span class="lbl">Followers</span>
        </button>
        <button class="stat-btn" onclick="openFolModal('following')">
          <span class="num" id="statFollowing">0</span>
          <span class="lbl">Following</span>
        </button>
      </div>
    </div>
    <div class="profile-btns">
      <button class="btn btn-primary" onclick="openEditModal()">✏️ Edit Profile</button>
      <button class="btn btn-ghost" onclick="logout()">🚪</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('posts',this)">📷 Posts</div>
    <div class="tab" onclick="switchTab('reels',this)">🎬 Reels</div>
    <div class="tab" onclick="switchTab('saved',this)">🔖 Saved</div>
  </div>
  <div id="postsGrid" class="posts-grid"></div>
  <div id="reelsGrid" class="posts-grid" style="display:none"></div>
  <div id="savedGrid" style="display:none;text-align:center;padding:3rem;color:var(--muted);">
    <div style="font-size:2.5rem;margin-bottom:.7rem">🔖</div>
    <p>No saved posts yet</p>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="drag"></div>
    <h3>✏️ Edit Profile</h3>
    <div class="alert s" id="saveOk">Profile saved! 🌸</div>
    <div class="alert e" id="saveErr"></div>
    <div class="fg"><label class="fl">Full Name</label><input type="text" id="eName" placeholder="Your name"/></div>
    <div class="fg"><label class="fl">Username</label><input type="text" id="eUsername" placeholder="@username"/></div>
    <div class="fg">
      <label class="fl">Bio</label>
      <textarea id="eBio" placeholder="Tell the world about yourself..." maxlength="150" oninput="document.getElementById('bioC').textContent=this.value.length+'/150'"></textarea>
      <div class="char-c" id="bioC">0/150</div>
    </div>
    <div class="fg"><label class="fl">Date of Birth</label><input type="date" id="eDob"/></div>
    <div class="fg"><label class="fl">Mobile</label><input type="tel" id="eMobile" placeholder="+91 9876543210"/></div>
    <div class="fg"><label class="fl">Location</label><input type="text" id="eLocation" placeholder="City, Country"/></div>
    <div class="fg"><label class="fl">Website</label><input type="url" id="eWebsite" placeholder="https://yoursite.com"/></div>
    <div class="fg">
      <label class="fl">Preferred Language</label>
      <select id="eLang">
        <option value="en">🇬🇧 English</option><option value="hi">🇮🇳 हिंदी</option>
        <option value="ta">🇮🇳 தமிழ்</option><option value="te">🇮🇳 తెలుగు</option>
        <option value="kn">🇮🇳 ಕನ್ನಡ</option><option value="ml">🇮🇳 മലയാളം</option>
        <option value="fr">🇫🇷 Français</option><option value="es">🇪🇸 Español</option>
        <option value="ar">🇸🇦 العربية</option><option value="zh">🇨🇳 中文</option>
      </select>
    </div>
    <div class="macts">
      <button class="mbtn mbg" onclick="closeEditModal()">Cancel</button>
      <button class="mbtn mbp" onclick="saveProfile()">💾 Save</button>
    </div>
  </div>
</div>

<!-- FOLLOWERS / FOLLOWING MODAL -->
<div class="fol-modal-bg" id="folModal">
  <div class="fol-modal">
    <div class="fol-header">
      <div class="fol-title" id="folTitle">Following</div>
      <button class="fol-close" onclick="closeFolModal()">✕</button>
    </div>
    <div class="fol-search">
      <input type="text" placeholder="🔍 Search..." oninput="filterFolList(this.value)" id="folSearchInp"/>
    </div>
    <div class="fol-list" id="folList">
      <div style="text-align:center;padding:2rem"><div class="mspin"></div></div>
    </div>
  </div>
</div>

<script>
let sb=null,cu=null,cp=null;
let myFollowingIds=new Set();
let currentFolMode='following';
let allFolItems=[];

async function boot(){
  try{
    const r=await fetch('/api/env');
    const k=await r.json();
    sb=supabase.createClient(k.SUPABASE_URL,k.SUPABASE_ANON_KEY);
    const {data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='login.html';return;}
    cu=session.user;
    document.getElementById('ls').style.display='none';
    await loadProfile();
    await loadPosts();
    // Load my following IDs
    const {data:fols}=await sb.from('follows').select('following_id').eq('follower_id',cu.id);
    (fols||[]).forEach(f=>myFollowingIds.add(f.following_id));
  }catch(e){
    document.getElementById('ls').innerHTML=`<div style="color:var(--error);text-align:center;padding:2rem">${e.message}</div>`;
  }
}
boot();

// ── LOAD PROFILE ─────────────────────────────────────────
async function loadProfile(){
  const {data:p,error}=await sb.from('profiles').select('*').eq('id',cu.id).single();
  if(error||!p)return;
  cp=p;
  document.getElementById('profileName').textContent=p.full_name||'Sweety User';
  document.getElementById('profileHandle').textContent='@'+(p.username||cu.email.split('@')[0]);
  document.getElementById('profileBio').textContent=p.bio||'No bio yet. Click Edit Profile to add one.';
  document.getElementById('statFollowers').textContent=p.followers_count||0;
  document.getElementById('statFollowing').textContent=p.following_count||0;
  document.getElementById('statPosts').textContent=p.posts_count||0;

  // ✅ Show avatar photo if set
  if(p.avatar_url){
    const img=document.getElementById('avatarImg');
    img.src=p.avatar_url; img.style.display='block';
    document.getElementById('avatarEmoji').style.display='none';
  }else{
    document.getElementById('avatarImg').style.display='none';
    document.getElementById('avatarEmoji').style.display='block';
  }

  // Show cover photo
  if(p.cover_url){
    const ci=document.getElementById('coverImg');
    ci.src=p.cover_url; ci.style.display='block';
  }

  // Pre-fill edit form
  document.getElementById('eName').value=p.full_name||'';
  document.getElementById('eUsername').value=p.username||'';
  document.getElementById('eBio').value=p.bio||'';
  document.getElementById('bioC').textContent=(p.bio||'').length+'/150';
  document.getElementById('eDob').value=p.dob||'';
  document.getElementById('eMobile').value=p.mobile||'';
  document.getElementById('eLocation').value=p.location||'';
  document.getElementById('eWebsite').value=p.website||'';
  document.getElementById('eLang').value=p.preferred_lang||'en';
}

// ── LOAD POSTS ────────────────────────────────────────────
async function loadPosts(){
  const {data:posts}=await sb.from('posts').select('*').eq('user_id',cu.id).order('created_at',{ascending:false});
  const photos=(posts||[]).filter(p=>p.post_type!=='reel');
  const reels=(posts||[]).filter(p=>p.post_type==='reel');
  renderGrid('postsGrid',photos);
  renderGrid('reelsGrid',reels);
}

function renderGrid(gridId,posts){
  const grid=document.getElementById(gridId);
  if(!posts||posts.length===0){
    grid.innerHTML=`<div class="empty-state"><div class="icon">📸</div><p style="font-size:.87rem">No posts yet</p></div>`;
    return;
  }
  grid.innerHTML='';
  posts.forEach(post=>{
    const div=document.createElement('div');div.className='p-thumb';
    if(post.image_url){
      if(post.post_type==='reel'){
        div.innerHTML=`<video src="${post.image_url}" muted loading="lazy"></video><span class="reel-icon">🎬</span>`;
      }else{
        div.innerHTML=`<img src="${post.image_url}" loading="lazy"/>`;
      }
    }else{
      div.style.cssText='background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;';
      div.textContent='📝';
    }
    div.innerHTML+=`<div class="overlay"><span>❤️ ${post.likes_count||0}</span><span>💬 ${post.comments_count||0}</span></div>`;
    div.onclick=()=>viewPost(post);
    grid.appendChild(div);
  });
}

function viewPost(post){
  // Simple view — could be expanded
  const msg=`${post.caption||'No caption'}\n\n❤️ ${post.likes_count||0} likes  💬 ${post.comments_count||0} comments`;
  alert(msg);
}

// ── UPLOAD MEDIA ──────────────────────────────────────────
async function uploadMedia(input,type){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    // Show preview immediately
    if(type==='avatar'){
      document.getElementById('avatarImg').src=e.target.result;
      document.getElementById('avatarImg').style.display='block';
      document.getElementById('avatarEmoji').style.display='none';
    }else{
      document.getElementById('coverImg').src=e.target.result;
      document.getElementById('coverImg').style.display='block';
    }
    try{
      const res=await fetch('/api/upload',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fileBase64:e.target.result,fileName:file.name,folder:`${type}s/${cu.id}`,contentType:file.type})
      });
      const d=await res.json();
      if(!d.success)throw new Error(d.error);
      const upd=type==='avatar'?{avatar_url:d.url}:{cover_url:d.url};
      await sb.from('profiles').update(upd).eq('id',cu.id);
    }catch(err){alert('Upload failed: '+err.message);}
  };
  reader.readAsDataURL(file);
  input.value='';
}

// ── SAVE PROFILE ──────────────────────────────────────────
async function saveProfile(){
  const updates={
    full_name:document.getElementById('eName').value.trim(),
    username:document.getElementById('eUsername').value.replace('@','').trim(),
    bio:document.getElementById('eBio').value.trim(),
    dob:document.getElementById('eDob').value,
    mobile:document.getElementById('eMobile').value.trim(),
    location:document.getElementById('eLocation').value.trim(),
    website:document.getElementById('eWebsite').value.trim(),
    preferred_lang:document.getElementById('eLang').value,
    updated_at:new Date().toISOString()
  };
  try{
    const {error}=await sb.from('profiles').update(updates).eq('id',cu.id);
    if(error)throw error;
    document.getElementById('saveOk').style.display='block';
    await loadProfile();
    setTimeout(()=>{document.getElementById('saveOk').style.display='none';closeEditModal();},2000);
  }catch(err){
    document.getElementById('saveErr').textContent=err.message;
    document.getElementById('saveErr').style.display='block';
  }
}

// ── FOLLOWERS / FOLLOWING MODAL ───────────────────────────
async function openFolModal(mode){
  if(mode==='posts') return; // posts tab just scrolls
  currentFolMode=mode;
  document.getElementById('folTitle').textContent=mode==='followers'?'👥 Followers':'👥 Following';
  document.getElementById('folModal').classList.add('open');
  document.getElementById('folSearchInp').value='';
  await loadFolList(mode);
}

async function loadFolList(mode){
  const list=document.getElementById('folList');
  list.innerHTML='<div style="text-align:center;padding:2rem"><div class="mspin"></div></div>';
  try{
    let users=[];
    if(mode==='followers'){
      // People who follow ME
      const {data}=await sb.from('follows')
        .select('follower_id, profiles!follows_follower_id_fkey(id,full_name,avatar_url,username,bio)')
        .eq('following_id',cu.id);
      users=(data||[]).map(d=>d.profiles).filter(Boolean);
    }else{
      // People I follow
      const {data}=await sb.from('follows')
        .select('following_id, profiles!follows_following_id_fkey(id,full_name,avatar_url,username,bio)')
        .eq('follower_id',cu.id);
      users=(data||[]).map(d=>d.profiles).filter(Boolean);
    }
    allFolItems=users;
    renderFolList(users,mode);
  }catch(e){
    list.innerHTML=`<div style="color:var(--muted);text-align:center;padding:1.5rem;font-size:.85rem">${e.message}</div>`;
  }
}

function renderFolList(users,mode){
  const list=document.getElementById('folList');
  if(!users||users.length===0){
    list.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--muted)">
      <div style="font-size:2.5rem;margin-bottom:.8rem">${mode==='followers'?'👥':'🔍'}</div>
      <p style="font-size:.87rem">${mode==='followers'?'No followers yet':'Not following anyone yet'}</p>
      ${mode!=='followers'?`<p style="font-size:.8rem;margin-top:.5rem">Go to <a href="social.html" style="color:var(--pink)">Social</a> to find people!</p>`:''}
    </div>`;
    return;
  }
  list.innerHTML='';
  users.forEach(u=>{
    const isFollowing=myFollowingIds.has(u.id);
    const div=document.createElement('div');div.className='fol-item';
    const av=u.avatar_url?`<img src="${u.avatar_url}" loading="lazy"/>`:u.full_name?.[0]?.toUpperCase()||'?';
    div.innerHTML=`
      <div class="fol-av" onclick="goToProfile('${u.id}')">${av}</div>
      <div class="fol-info" onclick="goToProfile('${u.id}')">
        <div class="fol-name">${u.full_name||'User'}</div>
        <div class="fol-handle">@${u.username||u.full_name?.toLowerCase().replace(/\s/g,'_')||'user'}</div>
      </div>
      <div class="fol-action">
        ${u.id!==cu.id?`
          <button class="fol-btn ${isFollowing?'unfollow':'follow'}" onclick="toggleFolItem(this,'${u.id}')" id="folbtn-${u.id}">
            ${isFollowing?'Unfollow':'Follow'}
          </button>
          <button class="fol-btn msg" onclick="window.location.href='messages.html'">💬</button>
        `:'<span style="font-size:.78rem;color:var(--muted)">You</span>'}
      </div>`;
    list.appendChild(div);
  });
}

async function toggleFolItem(btn,uid){
  const isUnfollow=btn.classList.contains('unfollow');
  try{
    if(isUnfollow){
      if(!confirm('Unfollow this person?'))return;
      await sb.from('follows').delete().eq('follower_id',cu.id).eq('following_id',uid);
      myFollowingIds.delete(uid);
      btn.className='fol-btn follow';btn.textContent='Follow';
    }else{
      await sb.from('follows').insert({follower_id:cu.id,following_id:uid});
      myFollowingIds.add(uid);
      btn.className='fol-btn unfollow';btn.textContent='Unfollow';
    }
    // Refresh counts
    await loadProfile();
  }catch(e){alert('Error: '+e.message);}
}

function filterFolList(q){
  const filtered=q?allFolItems.filter(u=>(u.full_name||'').toLowerCase().includes(q.toLowerCase())):allFolItems;
  renderFolList(filtered,currentFolMode);
}

function goToProfile(uid){
  if(uid===cu.id){closeFolModal();return;}
  // Could navigate to user profile — for now show social page
  closeFolModal();
  window.location.href='social.html';
}

function closeFolModal(){document.getElementById('folModal').classList.remove('open');}
document.getElementById('folModal').onclick=e=>{if(e.target===document.getElementById('folModal'))closeFolModal();};

// ── TABS ─────────────────────────────────────────────────
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById('postsGrid').style.display=tab==='posts'?'grid':'none';
  document.getElementById('reelsGrid').style.display=tab==='reels'?'grid':'none';
  document.getElementById('savedGrid').style.display=tab==='saved'?'block':'none';
}

// ── EDIT MODAL ────────────────────────────────────────────
function openEditModal(){document.getElementById('editModal').classList.add('open');}
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}
document.getElementById('editModal').onclick=e=>{if(e.target===document.getElementById('editModal'))closeEditModal();};

async function logout(){await sb.auth.signOut();window.location.href='login.html';}
</script>
</body></html>
