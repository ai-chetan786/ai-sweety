<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forgot Password — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;--error:#ff4d4d;--success:#4dff91;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);}
.orb1{width:350px;height:350px;background:rgba(168,85,247,.2);top:-80px;left:-80px;}
.orb2{width:300px;height:300px;background:rgba(255,107,157,.15);bottom:-60px;right:-60px;}
.container{width:100%;max-width:420px;position:relative;z-index:1;}
.logo-link{display:flex;align-items:center;gap:.6rem;text-decoration:none;justify-content:center;margin-bottom:2rem;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:2.5rem;}
.icon-big{text-align:center;font-size:3rem;margin-bottom:1rem;}
.card h2{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;margin-bottom:.4rem;text-align:center;}
.subtitle{color:var(--muted);font-size:.88rem;margin-bottom:2rem;text-align:center;line-height:1.6;}
.form-group{margin-bottom:1.5rem;}
label{display:block;font-size:.85rem;font-weight:500;color:var(--muted);margin-bottom:.5rem;}
.input-icon{position:relative;}
.input-icon input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.85rem 1rem .85rem 2.8rem;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;transition:all .2s;outline:none;}
.input-icon input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,.15);}
.input-icon input::placeholder{color:var(--muted);}
.input-icon .icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}
.btn{width:100%;padding:.95rem;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;border:none;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,157,.4);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.back-link{text-align:center;margin-top:1.2rem;font-size:.9rem;color:var(--muted);}
.back-link a{color:var(--pink);text-decoration:none;font-weight:600;}
.alert{padding:.9rem 1rem;border-radius:10px;font-size:.88rem;margin-bottom:1rem;display:none;}
.alert.error{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:var(--error);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.success-state{text-align:center;display:none;}
.big-check{font-size:4rem;margin-bottom:1rem;}
.success-state h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.6rem;}
.success-state p{color:var(--muted);font-size:.9rem;line-height:1.6;}
.btn-back{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:.85rem;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:1.5rem;text-decoration:none;}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="container">
  <a href="index.html" class="logo-link"><div class="logo-icon">🌸</div><span class="logo-text">AI Sweety</span></a>
  <div class="card">
    <div id="formState">
      <div class="icon-big">🔐</div>
      <h2>Forgot Password?</h2>
      <p class="subtitle">No worries! Enter your Gmail and we'll send you a reset link right away.</p>
      <div class="alert error" id="errorMsg"></div>
      <div class="form-group">
        <label>Gmail Address</label>
        <div class="input-icon"><span class="icon">📧</span><input type="email" id="email" placeholder="you@gmail.com"/></div>
      </div>
      <button class="btn btn-primary" id="sendBtn" onclick="sendReset()">📨 Send Reset Link</button>
      <div class="back-link"><a href="login.html">← Back to Login</a></div>
    </div>
    <div class="success-state" id="successState">
      <div class="big-check">✅</div>
      <h3>Check Your Gmail!</h3>
      <p>We sent a password reset link to<br/><strong id="sentEmail"></strong><br/><br/>Check your inbox and spam folder 📬</p>
      <a href="login.html" class="btn-back">← Back to Login</a>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL      = "https://bonenmlzfzctwjwquouz.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvbmVubWx6ZnpjdHdqd3F1b3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTMzMTQsImV4cCI6MjA5NDM2OTMxNH0.0h1r-396MV6TRugr5sGGTvjeL4by0dEizpdOnnje65kY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function sendReset(){
  const email=document.getElementById('email').value.trim();
  if(!email||!email.includes('@')){
    const el=document.getElementById('errorMsg');el.textContent='Please enter a valid Gmail address.';el.style.display='block';return;
  }
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Sending...';
  try{
    const {error}=await sb.auth.resetPasswordForEmail(email,{
      redirectTo: window.location.origin+'/reset-password.html'
    });
    if(error)throw error;
    document.getElementById('sentEmail').textContent=email;
    document.getElementById('formState').style.display='none';
    document.getElementById('successState').style.display='block';
  }catch(err){
    const el=document.getElementById('errorMsg');el.textContent=err.message||'Failed to send. Try again.';el.style.display='block';
    btn.disabled=false;btn.innerHTML='📨 Send Reset Link';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')sendReset();});
</script>
</body></html>
