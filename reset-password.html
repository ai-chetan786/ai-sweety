<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;--error:#ff4d4d;--success:#4dff91;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);}
.orb1{width:350px;height:350px;background:rgba(168,85,247,.2);top:-80px;right:-80px;}
.orb2{width:300px;height:300px;background:rgba(255,107,157,.15);bottom:-60px;left:-60px;}
.container{width:100%;max-width:430px;position:relative;z-index:1;}
.logo-link{display:flex;align-items:center;gap:.6rem;text-decoration:none;justify-content:center;margin-bottom:2rem;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:2.5rem;}
.icon-big{text-align:center;font-size:3rem;margin-bottom:1rem;}
.card h2{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;margin-bottom:.4rem;text-align:center;}
.subtitle{color:var(--muted);font-size:.88rem;margin-bottom:2rem;text-align:center;}
.form-group{margin-bottom:1.2rem;}
label{display:block;font-size:.85rem;font-weight:500;color:var(--muted);margin-bottom:.5rem;}
.password-wrap{position:relative;}
.password-wrap input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.85rem 3rem .85rem 1rem;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;transition:all .2s;outline:none;}
.password-wrap input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,.15);}
.password-wrap input::placeholder{color:var(--muted);}
.toggle-pw{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;}
.strength-bar{height:4px;border-radius:2px;margin-top:.5rem;transition:all .3s;background:rgba(255,255,255,.1);}
.strength-text{font-size:.75rem;color:var(--muted);margin-top:.3rem;}
.btn{width:100%;padding:.95rem;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;border:none;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.5rem;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,157,.4);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.alert{padding:.9rem 1rem;border-radius:10px;font-size:.88rem;margin-bottom:1rem;display:none;}
.alert.error{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:var(--error);}
.alert.success{background:rgba(77,255,145,.1);border:1px solid rgba(77,255,145,.3);color:var(--success);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="container">
  <a href="index.html" class="logo-link"><div class="logo-icon">🌸</div><span class="logo-text">AI Sweety</span></a>
  <div class="card">
    <div class="icon-big">🔑</div>
    <h2>Set New Password</h2>
    <p class="subtitle">Choose a strong new password for your account</p>
    <div class="alert error" id="errorMsg"></div>
    <div class="alert success" id="successMsg"></div>
    <div class="form-group">
      <label>New Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength(this.value)"/>
        <button class="toggle-pw" onclick="togglePw('password')" type="button">👁️</button>
      </div>
      <div class="strength-bar" id="strengthBar"></div>
      <div class="strength-text" id="strengthText"></div>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <div class="password-wrap">
        <input type="password" id="confirmPassword" placeholder="Repeat new password"/>
        <button class="toggle-pw" onclick="togglePw('confirmPassword')" type="button">👁️</button>
      </div>
    </div>
    <button class="btn btn-primary" id="resetBtn" onclick="resetPassword()">🔐 Update Password</button>
  </div>
</div>
<script>
const SUPABASE_URL      = "https://bonenmlzfzctwjwquouz.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvbmVubWx6ZnpjdHdqd3F1b3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTMzMTQsImV4cCI6MjA5NDM2OTMxNH0.0h1r-396MV6TRugr5sGGTvjeL4by0dEizpdOnnje65k";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function togglePw(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
function checkStrength(pw){
  const bar=document.getElementById('strengthBar'),txt=document.getElementById('strengthText');
  let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const c=['#ff4d4d','#ff9944','#ffd700','#4dff91','#00e5ff'],l=['Very Weak','Weak','Fair','Strong','Very Strong'];
  bar.style.background=c[s-1]||'rgba(255,255,255,.1)';bar.style.width=(s*20)+'%';
  txt.textContent=pw?l[s-1]||'':'';txt.style.color=c[s-1]||'var(--muted)';
}
function showAlert(type,msg){
  document.getElementById('errorMsg').style.display='none';document.getElementById('successMsg').style.display='none';
  const el=document.getElementById(type==='error'?'errorMsg':'successMsg');el.textContent=msg;el.style.display='block';
}
async function resetPassword(){
  const pw=document.getElementById('password').value;
  const confirm=document.getElementById('confirmPassword').value;
  if(pw.length<8)return showAlert('error','Password must be at least 8 characters.');
  if(pw!==confirm)return showAlert('error','Passwords do not match.');
  const btn=document.getElementById('resetBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Updating...';
  try{
    const {error}=await sb.auth.updateUser({password:pw});
    if(error)throw error;
    showAlert('success','✅ Password updated! Redirecting to login... 🌸');
    setTimeout(()=>window.location.href='login.html',2500);
  }catch(err){
    showAlert('error',err.message||'Failed to update password.');
    btn.disabled=false;btn.innerHTML='🔐 Update Password';
  }
}
</script>
</body></html>
