<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--dark2:#12121a;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;}
.sidebar{width:220px;background:var(--dark2);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;flex-shrink:0;height:100vh;}
.sidebar-logo{padding:1.2rem 1rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.05);}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.new-chat-btn{margin:1rem;padding:.7rem 1rem;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:10px;color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.5rem;}
.sidebar-section{padding:.5rem 1rem .3rem;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.chat-history{flex:1;overflow-y:auto;padding:0 .5rem;}
.history-item{padding:.65rem .8rem;border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.5rem;}
.history-item:hover{background:rgba(255,107,157,.1);color:var(--text);}
.sidebar-bottom{padding:1rem;border-top:1px solid rgba(255,255,255,.05);}
.user-mini{display:flex;align-items:center;gap:.7rem;padding:.6rem;border-radius:10px;text-decoration:none;}
.user-mini:hover{background:rgba(255,255,255,.05);}
.user-avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.user-name-sm{font-size:.82rem;font-weight:600;color:var(--text);}
.user-role-sm{font-size:.72rem;color:var(--muted);}
.sidebar-nav{padding:.5rem;}
.nav-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .8rem;border-radius:8px;font-size:.85rem;color:var(--muted);text-decoration:none;transition:.2s;}
.nav-item:hover,.nav-item.active{background:rgba(255,107,157,.1);color:var(--pink);}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.top-bar{padding:.9rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.model-badge{background:rgba(255,107,157,.1);border:1px solid rgba(255,107,157,.2);color:var(--pink);padding:.3rem .8rem;border-radius:50px;font-size:.75rem;font-weight:600;}
.top-actions{display:flex;align-items:center;gap:.5rem;}
.icon-btn{width:34px;height:34px;border-radius:8px;background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.icon-btn:hover{border-color:var(--pink);color:var(--pink);}
.lang-pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:50px;padding:.3rem .8rem;font-size:.78rem;color:var(--text);outline:none;}
.chat-area{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem;}
.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.big-logo{font-size:4rem;margin-bottom:1rem;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.welcome-screen h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:.5rem;}
.welcome-screen p{color:var(--muted);font-size:.95rem;max-width:400px;line-height:1.7;}
.suggestion-chips{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-top:1.5rem;}
.chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:.5rem 1rem;font-size:.82rem;cursor:pointer;color:var(--text);}
.chip:hover{border-color:var(--pink);color:var(--pink);}
.msg{display:flex;gap:.9rem;max-width:80%;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.msg.sweety .msg-avatar{background:linear-gradient(135deg,var(--pink),var(--purple));}
.msg.user .msg-avatar{background:rgba(255,255,255,.1);}
.msg-bubble{border-radius:16px;padding:.9rem 1.1rem;font-size:.9rem;line-height:1.7;}
.msg.sweety .msg-bubble{background:rgba(255,107,157,.08);border:1px solid rgba(255,107,157,.12);border-top-left-radius:4px;}
.msg.user .msg-bubble{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.2);border-top-right-radius:4px;}
.watermark{font-size:.72rem;color:var(--pink);margin-top:.5rem;opacity:.7;}
.msg-time{font-size:.7rem;color:var(--muted);margin-top:.4rem;}
.msg-image{max-width:300px;border-radius:12px;margin-top:.5rem;border:1px solid rgba(255,255,255,.1);}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:.5rem;}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--pink);animation:typing .9s ease infinite;}
.typing-indicator span:nth-child(2){animation-delay:.15s;}
.typing-indicator span:nth-child(3){animation-delay:.3s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.input-area{padding:1rem 1.5rem 1.2rem;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.upload-preview{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.6rem;}
.upload-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
.upload-thumb img{width:100%;height:100%;object-fit:cover;}
.remove-thumb{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.7);border-radius:50%;border:none;color:#fff;font-size:.6rem;cursor:pointer;}
.mode-tabs{display:flex;gap:.4rem;margin-bottom:.7rem;}
.mode-tab{padding:.3rem .8rem;border-radius:50px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.1);color:var(--muted);background:none;transition:.2s;}
.mode-tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent;color:#fff;}
.input-box{display:flex;align-items:flex-end;gap:.6rem;background:var(--dark2);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:.5rem .5rem .5rem 1rem;}
.input-box:focus-within{border-color:var(--pink);}
.input-box textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.92rem;font-family:'DM Sans',sans-serif;resize:none;max-height:140px;line-height:1.5;padding:.4rem 0;}
.input-box textarea::placeholder{color:var(--muted);}
.input-actions{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.attach-btn,.send-btn{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.attach-btn{background:rgba(255,255,255,.06);color:var(--muted);}
.attach-btn:hover{background:rgba(255,107,157,.1);color:var(--pink);}
.send-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
#fileInput,#cameraInput{display:none;}
.loading-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem;}
.spin{width:40px;height:40px;border:3px solid rgba(255,107,157,.2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:700px){.sidebar{position:fixed;left:-220px;z-index:200;transition:.3s;}.sidebar.open{left:0;}.msg{max-width:92%;}}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spin"></div>
  <div style="color:var(--muted)">Starting AI Sweety... 🌸</div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🌸</div>
    <span class="logo-text">AI Sweety</span>
  </div>
  <button class="new-chat-btn" onclick="newChat()">✏️ New Chat</button>
  <nav class="sidebar-nav">
    <a href="chat.html" class="nav-item active">💬 Chat</a>
    <a href="social.html" class="nav-item">📸 Social</a>
    <a href="profile.html" class="nav-item">👤 Profile</a>
  </nav>
  <div class="sidebar-section">Recent Chats</div>
  <div class="chat-history" id="chatHistory"></div>
  <div class="sidebar-bottom">
    <a href="profile.html" class="user-mini">
      <div class="user-avatar-sm">🌸</div>
      <div>
        <div class="user-name-sm" id="sidebarName">Loading...</div>
        <div class="user-role-sm">Sweety Member</div>
      </div>
    </a>
  </div>
</aside>

<div class="main">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:.8rem;">
      <button class="icon-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <span class="model-badge">🤖 Groq · Llama3-8B</span>
    </div>
    <div class="top-actions">
      <select class="lang-pill" id="langSelect" onchange="currentLang=this.value">
        <option value="en">🌐 English</option>
        <option value="hi">हिंदी</option><option value="ta">தமிழ்</option>
        <option value="te">తెలుగు</option><option value="kn">ಕನ್ನಡ</option>
        <option value="ml">മലയാളം</option><option value="mr">मराठी</option>
        <option value="bn">বাংলা</option><option value="fr">Français</option>
        <option value="es">Español</option><option value="ar">العربية</option>
        <option value="zh">中文</option>
      </select>
      <button class="icon-btn" onclick="newChat()">🗑️</button>
      <button class="icon-btn" onclick="logout()">🚪</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="big-logo">🌸</div>
      <h2>Hi! I'm <span style="color:var(--pink)">Sweety</span> 💕</h2>
      <p>Your all-in-one AI companion. Ask me anything!</p>
      <div class="suggestion-chips">
        <span class="chip" onclick="usePrompt('Help me understand my legal rights as a tenant')">⚖️ Legal Help</span>
        <span class="chip" onclick="usePrompt('Generate an image of a beautiful sunset over mountains')">🎨 Generate Image</span>
        <span class="chip" onclick="usePrompt('What are the latest AI news today?')">📰 Latest News</span>
        <span class="chip" onclick="usePrompt('Help me fix my Python code error')">💻 IT Help</span>
        <span class="chip" onclick="usePrompt('Write a creative Instagram caption')">📸 Social Media</span>
        <span class="chip" onclick="usePrompt('Tell me something motivational for today')">✨ Inspire Me</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('chat',this)">💬 Chat</button>
      <button class="mode-tab" onclick="setMode('image',this)">🎨 Image Gen</button>
      <button class="mode-tab" onclick="setMode('news',this)">📰 News Search</button>
    </div>
    <div class="upload-preview" id="uploadPreview"></div>
    <div class="input-box">
      <textarea id="msgInput" placeholder="Ask Sweety anything..." rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,140)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <div class="input-actions">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="attach-btn" onclick="document.getElementById('cameraInput').click()">📷</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt" onchange="handleFile(this)"/>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFile(this)"/>
  </div>
</div>

<script>
// ✅ Zero keys here — loaded safely from /api/env
let CFG = {};
let sb = null;
let messages = [], mode = 'chat', currentLang = 'en';
let uploadedFiles = [], currentUser = null;

// ── GROQ MODELS (updated 2025) ────────────────────────────
// llama3-70b-8192 is decommissioned — using new models
const GROQ_MODELS = [
  'llama-3.3-70b-versatile',      // Best — most capable
  'llama-3.1-8b-instant',         // Fast fallback
  'gemma2-9b-it',                 // Google Gemma fallback
  'mixtral-8x7b-32768'            // Mixtral fallback
];

// ── OPENROUTER MODELS ─────────────────────────────────────
const OR_MODEL = 'mistralai/mistral-7b-instruct:free';

// ── BOOT ──────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch('/api/env');
    if (!res.ok) throw new Error(`Config load failed: ${res.status}`);
    CFG = await res.json();
    sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
    document.getElementById('sidebarName').textContent = name;
    currentLang = currentUser.user_metadata?.preferred_lang || 'en';
    document.getElementById('langSelect').value = currentLang;
    document.getElementById('loadingScreen').style.display = 'none';
  } catch(err) {
    document.getElementById('loadingScreen').innerHTML =
      `<div style="color:#ff4d4d;text-align:center;padding:2rem;max-width:400px">
        <div style="font-size:2rem;margin-bottom:1rem">❌</div>
        <strong>Could not start AI Sweety</strong><br/><br/>
        <small style="color:var(--muted)">${err.message}</small>
      </div>`;
  }
}
boot();

// ── GROQ — tries multiple models automatically ────────────
async function callGroq(msgs, sys) {
  for (const model of GROQ_MODELS) {
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${CFG.GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'system', content: sys }, ...msgs],
          max_tokens: 2048,
          temperature: 0.7
        })
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        // If model decommissioned, try next model
        if (e?.error?.message?.includes('decommissioned') || res.status === 404) {
          console.warn(`Model ${model} unavailable, trying next...`);
          continue;
        }
        throw new Error(e?.error?.message || `Groq error ${res.status}`);
      }
      const data = await res.json();
      if (!data.choices?.[0]) continue;
      return data.choices[0].message.content;
    } catch(e) {
      if (e.message?.includes('decommissioned') || e.message?.includes('404')) continue;
      throw e;
    }
  }
  throw new Error('All Groq models unavailable');
}

// ── OPENROUTER FALLBACK ───────────────────────────────────
async function callOpenRouter(msgs, sys) {
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${CFG.OPENROUTER_API_KEY}`,
      'HTTP-Referer': window.location.origin,
      'X-Title': 'AI Sweety'
    },
    body: JSON.stringify({
      model: OR_MODEL,
      messages: [{ role: 'system', content: sys }, ...msgs]
    })
  });
  if (!res.ok) throw new Error(`OpenRouter error ${res.status}`);
  const data = await res.json();
  if (!data.choices?.[0]) throw new Error('Empty response from OpenRouter');
  return data.choices[0].message.content;
}

// ── SMART AI — Groq first, OpenRouter fallback ───────────
async function askAI(msgs, sys) {
  try {
    return await callGroq(msgs, sys);
  } catch(e) {
    console.warn('Groq failed:', e.message, '— trying OpenRouter...');
    return await callOpenRouter(msgs, sys);
  }
}

// ── TAVILY NEWS ───────────────────────────────────────────
async function searchWeb(query) {
  const res = await fetch('https://api.tavily.com/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ api_key: CFG.TAVILY_API_KEY, query, search_depth: 'basic', max_results: 5 })
  });
  if (!res.ok) throw new Error(`Tavily error ${res.status}`);
  const data = await res.json();
  return data.results || [];
}

// ── HUGGING FACE IMAGE GEN ────────────────────────────────
async function generateImage(prompt) {
  const res = await fetch(
    'https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0',
    {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${CFG.HF_API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ inputs: prompt })
    }
  );
  if (!res.ok) throw new Error('Image model is loading. Wait 30 seconds and try again! 🎨');
  const blob = await res.blob();
  return URL.createObjectURL(blob);
}

// ── UI HELPERS ────────────────────────────────────────────
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const ph = { chat: 'Ask Sweety anything...', image: 'Describe the image you want to create...', news: 'Search for latest news...' };
  document.getElementById('msgInput').placeholder = ph[m];
}

function usePrompt(text) {
  const ws = document.getElementById('welcomeScreen'); if (ws) ws.remove();
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function newChat() {
  messages = [];
  document.getElementById('chatArea').innerHTML = `
    <div class="welcome-screen" id="welcomeScreen">
      <div class="big-logo">🌸</div>
      <h2>Hi! I'm <span style="color:var(--pink)">Sweety</span> 💕</h2>
      <p>Ask me anything!</p>
      <div class="suggestion-chips">
        <span class="chip" onclick="usePrompt('Help me with a legal problem')">⚖️ Legal</span>
        <span class="chip" onclick="usePrompt('Generate a beautiful sunset image')">🎨 Image</span>
        <span class="chip" onclick="usePrompt('Latest AI news today')">📰 News</span>
        <span class="chip" onclick="usePrompt('Help me fix my code')">💻 Code</span>
      </div>
    </div>`;
}

function handleFile(input) {
  const preview = document.getElementById('uploadPreview');
  Array.from(input.files).forEach(file => {
    uploadedFiles.push(file);
    const div = document.createElement('div'); div.className = 'upload-thumb';
    if (file.type.startsWith('image/')) {
      const img = document.createElement('img'); img.src = URL.createObjectURL(file); div.appendChild(img);
    } else {
      div.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:.65rem;padding:4px;color:var(--muted)">📄 ${file.name.slice(0,8)}</div>`;
    }
    const rm = document.createElement('button'); rm.className = 'remove-thumb'; rm.innerHTML = '✕';
    rm.onclick = () => { uploadedFiles = uploadedFiles.filter(f => f !== file); div.remove(); };
    div.appendChild(rm); preview.appendChild(div);
  });
  input.value = '';
}

function addMessage(role, content, imageUrl = null) {
  const ws = document.getElementById('welcomeScreen'); if (ws) ws.remove();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div'); div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const avatar = role === 'sweety' ? '🌸' : '👤';
  const wm = role === 'sweety' ? `<div class="watermark">🌸 © AI Sweety</div>` : '';
  const imgHtml = imageUrl ? `<img class="msg-image" src="${imageUrl}" alt="Generated"/>` : '';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div><div class="msg-bubble">${content}${imgHtml}${wm}</div><div class="msg-time">${time}</div></div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div'); div.className = 'msg sweety'; div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-avatar">🌸</div><div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typingMsg'); if (t) t.remove(); }

function addToHistory(text) {
  const h = document.getElementById('chatHistory');
  const d = document.createElement('div'); d.className = 'history-item';
  d.innerHTML = `<span>💬</span>${text.slice(0,28)}${text.length>28?'...':''}`;
  h.insertBefore(d, h.firstChild);
}

// ── SEND MESSAGE ──────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && uploadedFiles.length === 0) return;
  const btn = document.getElementById('sendBtn'); btn.disabled = true;
  const userText = text || `[Uploaded ${uploadedFiles.length} file(s)]`;
  addMessage('user', userText);
  messages.push({ role: 'user', content: userText });
  input.value = ''; input.style.height = 'auto';
  document.getElementById('uploadPreview').innerHTML = '';
  uploadedFiles = [];
  addTyping();

  try {
    if (mode === 'image') {
      removeTyping();
      addMessage('sweety', '🎨 Generating your image... please wait 20-30 seconds...');
      const imageUrl = await generateImage(text);
      const lastMsg = document.querySelector('#chatArea .msg.sweety:last-of-type');
      if (lastMsg) lastMsg.remove();
      addMessage('sweety', `Here's your AI generated image! 🎨`, imageUrl);

    } else if (mode === 'news') {
      const results = await searchWeb(text);
      removeTyping();
      let html = `📰 Latest results for "<strong>${text}</strong>":<br/><br/>`;
      if (!results.length) {
        html += 'No results found. Try different keywords.';
      } else {
        results.slice(0,4).forEach((r,i) => {
          html += `<strong>${i+1}. ${r.title}</strong><br/>${(r.content||'').slice(0,150)}...<br/><br/>`;
        });
      }
      addMessage('sweety', html);

    } else {
      const langNote = currentLang !== 'en' ? `Always respond in language code: ${currentLang}. ` : '';
      const sys = `You are AI Sweety, a friendly, helpful, and intelligent AI assistant. You help with legal questions, IT problems, coding, social media, creative writing, and all general questions. Be warm and supportive. ${langNote}Always end your response with "© AI Sweety".`;
      const reply = await askAI(messages, sys);
      removeTyping();
      addMessage('sweety', reply.replace(/\n/g, '<br/>'));
      messages.push({ role: 'assistant', content: reply });
      addToHistory(userText);
    }
  } catch(err) {
    removeTyping();
    addMessage('sweety', `Sorry, I had a problem! 🌸<br/><small style="color:var(--muted)">${err.message}</small>`);
  } finally {
    btn.disabled = false;
  }
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'login.html';
}
</script>
</body></html>
