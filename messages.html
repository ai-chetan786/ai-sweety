<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Chit-Chatok — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--dark2:#12121a;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;--success:#4dff91;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;}

/* TOPNAV */
.topnav{padding:.75rem 1rem;display:flex;align-items:center;gap:.8rem;background:rgba(10,10,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.back-link{color:var(--pink);text-decoration:none;font-size:1.4rem;display:flex;align-items:center;flex-shrink:0;}
.nav-brand{display:flex;align-items:center;gap:.4rem;flex:1;}
.brand-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;}
.brand-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-size:.68rem;color:var(--muted);margin-left:.2rem;}
.new-btn{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* LAYOUT */
.layout{flex:1;display:flex;overflow:hidden;}

/* CONV PANEL */
.conv-panel{width:100%;max-width:380px;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;background:var(--dark2);flex-shrink:0;}
.search-bar{padding:.65rem 1rem;border-bottom:1px solid rgba(255,255,255,.05);}
.search-inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:50px;padding:.5rem 1rem;color:var(--text);font-size:.87rem;font-family:'DM Sans',sans-serif;outline:none;}
.search-inp:focus{border-color:var(--pink);}
.search-inp::placeholder{color:var(--muted);}
.conv-list{flex:1;overflow-y:auto;}
.conv-list::-webkit-scrollbar{width:0;}
.conv-item{display:flex;align-items:center;gap:.8rem;padding:.9rem 1rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:.15s;-webkit-user-select:none;}
.conv-item:active{background:rgba(255,107,157,.1);}
.conv-item.active{background:rgba(255,107,157,.07);}
.c-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;position:relative;}
.c-av img{width:100%;height:100%;object-fit:cover;}
.c-online{position:absolute;bottom:1px;right:1px;width:12px;height:12px;background:var(--success);border-radius:50%;border:2px solid var(--dark2);}
.c-info{flex:1;min-width:0;}
.c-name{font-size:.92rem;font-weight:600;margin-bottom:.2rem;}
.c-last{font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-meta{flex-shrink:0;text-align:right;}
.c-time{font-size:.72rem;color:var(--muted);margin-bottom:.3rem;}
.unread-dot{width:10px;height:10px;background:var(--pink);border-radius:50%;margin-left:auto;}

/* CHAT PANEL - FULL SCREEN ON MOBILE */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--dark);}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;color:var(--muted);}
.chat-empty-icon{font-size:4rem;margin-bottom:1rem;}

/* CHAT HEADER */
.chat-head{padding:.8rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:.75rem;flex-shrink:0;background:var(--dark2);}
.ch-back{background:none;border:none;color:var(--pink);font-size:1.4rem;cursor:pointer;padding:.1rem .3rem;flex-shrink:0;}
.ch-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-status{font-size:.72rem;color:var(--success);}
.ch-action{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.3rem;}

/* MESSAGES */
.msgs-wrap{flex:1;overflow-y:auto;padding:.8rem 1rem;display:flex;flex-direction:column;gap:.5rem;-webkit-overflow-scrolling:touch;}
.msgs-wrap::-webkit-scrollbar{width:0;}
.date-sep{text-align:center;color:var(--muted);font-size:.7rem;padding:.3rem 0;position:relative;}
.date-sep span{background:var(--dark);padding:0 .6rem;position:relative;z-index:1;}
.date-sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.06);}

/* BUBBLES */
.row{display:flex;gap:.4rem;align-items:flex-end;max-width:85%;}
.row.mine{align-self:flex-end;flex-direction:row-reverse;}
.row.theirs{align-self:flex-start;}
.r-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;overflow:hidden;}
.r-av img{width:100%;height:100%;object-fit:cover;}
.r-wrap{display:flex;flex-direction:column;gap:.12rem;}
.bubble{padding:.6rem .9rem;font-size:.9rem;line-height:1.5;word-break:break-word;max-width:260px;border-radius:18px;}
.mine .bubble{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-bottom-right-radius:4px;}
.theirs .bubble{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:4px;}
.r-time{font-size:.68rem;color:var(--muted);}
.mine .r-time{text-align:right;}
.m-img{max-width:220px;border-radius:12px;margin-top:.25rem;cursor:pointer;display:block;border:1px solid rgba(255,255,255,.1);}
.m-file{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.08);border-radius:8px;padding:.4rem .7rem;font-size:.8rem;color:var(--text);text-decoration:none;margin-top:.25rem;}

/* INPUT AREA - FIXED BOTTOM */
.input-area{padding:.75rem .85rem;padding-bottom:max(.75rem, env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;background:var(--dark2);}
.attach-prev{display:flex;gap:.4rem;margin-bottom:.45rem;flex-wrap:wrap;}
.a-thumb{position:relative;width:48px;height:48px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,107,157,.3);}
.a-thumb img{width:100%;height:100%;object-fit:cover;}
.a-rm{position:absolute;top:1px;right:1px;width:16px;height:16px;background:rgba(0,0,0,.8);border-radius:50%;border:none;color:#fff;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.inp-row{display:flex;align-items:flex-end;gap:.4rem;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:24px;padding:.4rem .4rem .4rem .9rem;}
.inp-row:focus-within{border-color:var(--pink);}
.msg-ta{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.92rem;font-family:'DM Sans',sans-serif;resize:none;max-height:100px;line-height:1.5;padding:.3rem 0;}
.msg-ta::placeholder{color:var(--muted);}
.inp-btns{display:flex;align-items:center;gap:.2rem;flex-shrink:0;}
.ib{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;-webkit-tap-highlight-color:transparent;}
.ib-a{background:rgba(255,255,255,.07);color:var(--muted);}
.ib-a:active{background:rgba(255,107,157,.15);}
.ib-c{background:rgba(255,255,255,.07);color:var(--muted);}
.ib-c:active{background:rgba(255,107,157,.15);}
.ib-s{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.ib-s:disabled{opacity:.4;}

/* NEW DM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
@media(min-width:600px){.modal-bg{align-items:center;}}
.modal-box{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:1.4rem;max-height:85vh;display:flex;flex-direction:column;}
@media(min-width:600px){.modal-box{border-radius:20px;}}
.drag{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto .9rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:.9rem;}
.u-search{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:.55rem 1rem;color:var(--text);font-size:.87rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:.8rem;}
.u-search:focus{border-color:var(--pink);}
.u-list{flex:1;overflow-y:auto;}
.u-item{display:flex;align-items:center;gap:.7rem;padding:.75rem;border-radius:10px;cursor:pointer;transition:.15s;}
.u-item:active{background:rgba(255,107,157,.1);}
.u-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.95rem;overflow:hidden;flex-shrink:0;}
.u-av img{width:100%;height:100%;object-fit:cover;}
.u-name{font-size:.9rem;font-weight:600;}
.u-sub{font-size:.75rem;color:var(--muted);}

/* SPINNERS */
.spin{width:32px;height:32px;border:3px solid rgba(255,107,157,.2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.mspin{width:16px;height:16px;border:2px solid rgba(255,107,157,.2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;}
.ls{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999;}

/* MOBILE - FULL SCREEN CHAT */
@media(max-width:650px){
  .conv-panel{max-width:100%;border-right:none;}
  .chat-panel{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;}
  .chat-panel.open{display:flex;}
}
/* DESKTOP - SIDE BY SIDE */
@media(min-width:651px){
  .ch-back{display:none!important;}
  .chat-panel{display:flex;}
}
#fileInp,#camInp{display:none;}
</style>
</head>
<body>

<div class="ls" id="ls"><div class="spin"></div></div>

<nav class="topnav">
  <a href="social.html" class="back-link">←</a>
  <div class="nav-brand">
    <div class="brand-icon">💬</div>
    <span class="brand-name">Chit-Chatok</span>
    <span class="brand-sub">by AI Sweety</span>
  </div>
  <button class="new-btn" onclick="openNewDM()" title="New message">✏️</button>
</nav>

<div class="layout">
  <!-- CONV LIST -->
  <div class="conv-panel" id="convPanel">
    <div class="search-bar">
      <input class="search-inp" placeholder="🔍 Search Chit-Chatok..." oninput="filterConvs(this.value)"/>
    </div>
    <div class="conv-list" id="convList">
      <div style="text-align:center;padding:2.5rem"><div class="spin" style="margin:0 auto"></div></div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">💬</div>
      <h3 style="color:var(--text);margin-bottom:.5rem;font-size:1.1rem">Chit-Chatok</h3>
      <p style="max-width:240px;font-size:.87rem;line-height:1.6">Send messages, photos and files to your friends!</p>
      <button onclick="openNewDM()" style="margin-top:1.2rem;padding:.75rem 1.8rem;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:50px;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;">✏️ Start Chat</button>
    </div>

    <div id="chatUI" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="chat-head">
        <button class="ch-back" onclick="closeChat()">←</button>
        <div class="ch-av" id="chAv">🌸</div>
        <div class="ch-info">
          <div class="ch-name" id="chName">User</div>
          <div class="ch-status">● Online</div>
        </div>
        <button class="ch-action" onclick="viewProfile()" title="View Profile">👤</button>
      </div>
      <div class="msgs-wrap" id="msgsWrap"></div>
      <div class="input-area">
        <div class="attach-prev" id="attachPrev"></div>
        <div class="inp-row">
          <textarea class="msg-ta" id="msgTa" placeholder="Message..." rows="1"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <div class="inp-btns">
            <button class="ib ib-a" onclick="document.getElementById('fileInp').click()" title="File">📎</button>
            <button class="ib ib-c" onclick="document.getElementById('camInp').click()" title="Camera">📷</button>
            <button class="ib ib-s" id="sendBtn" onclick="sendMsg()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW DM MODAL -->
<div class="modal-bg" id="newDMModal">
  <div class="modal-box">
    <div class="drag"></div>
    <div class="modal-title">✉️ New Chit-Chatok</div>
    <input class="u-search" placeholder="Search your friends..." oninput="searchPpl(this.value)"/>
    <div class="u-list" id="pplList">
      <div style="text-align:center;padding:1rem"><div class="mspin"></div></div>
    </div>
    <div style="text-align:center;margin-top:.8rem">
      <button onclick="closeNewDM()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.88rem;padding:.5rem 1rem;">Cancel</button>
    </div>
  </div>
</div>

<input type="file" id="fileInp" accept="image/*,.pdf,.doc,.docx,.txt" onchange="attachFile(this,false)"/>
<input type="file" id="camInp" accept="image/*" capture="environment" onchange="attachFile(this,true)"/>

<script>
let sb=null,cu=null,cp=null;
let activeUid=null,activeProf=null,dmSub=null;
let attached=null,allPpl=[];

// ── BOOT ─────────────────────────────────────────────────
async function boot(){
  try{
    const r=await fetch('/api/env');
    const k=await r.json();
    sb=supabase.createClient(k.SUPABASE_URL,k.SUPABASE_ANON_KEY);
    const {data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='login.html';return;}
    cu=session.user;
    const {data:p}=await sb.from('profiles').select('*').eq('id',cu.id).single();
    cp=p;
    document.getElementById('ls').style.display='none';
    await Promise.all([loadConvList(),loadAllPpl()]);
  }catch(e){
    document.getElementById('ls').innerHTML=`<div style="color:#ff4d4d;text-align:center;padding:2rem;max-width:280px">${e.message}</div>`;
  }
}
boot();

// ── LOAD ALL FRIENDS (followers + following) ──────────────
async function loadAllPpl(){
  try{
    const [a,b]=await Promise.all([
      sb.from('follows').select('follower_id, profiles!follows_follower_id_fkey(id,full_name,avatar_url)').eq('following_id',cu.id),
      sb.from('follows').select('following_id, profiles!follows_following_id_fkey(id,full_name,avatar_url)').eq('follower_id',cu.id)
    ]);
    const seen=new Set();allPpl=[];
    [...(a.data||[]).map(x=>x.profiles),...(b.data||[]).map(x=>x.profiles)].forEach(p=>{
      if(p&&!seen.has(p.id)&&p.id!==cu.id){seen.add(p.id);allPpl.push(p);}
    });
  }catch(e){console.warn(e);}
}

// ── CONV LIST ─────────────────────────────────────────────
async function loadConvList(){
  const list=document.getElementById('convList');
  try{
    const {data:msgs}=await sb.from('direct_messages')
      .select('id,sender_id,receiver_id,content,file_url,is_read,created_at')
      .or(`sender_id.eq.${cu.id},receiver_id.eq.${cu.id}`)
      .order('created_at',{ascending:false});

    if(!msgs||msgs.length===0){
      list.innerHTML=`<div style="text-align:center;padding:2.5rem;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:.8rem">💬</div><p style="font-size:.87rem">No conversations yet!<br/>Start chatting with friends.</p></div>`;
      return;
    }
    const map={};
    msgs.forEach(m=>{
      const oid=m.sender_id===cu.id?m.receiver_id:m.sender_id;
      if(!map[oid])map[oid]=m;
    });
    const oids=Object.keys(map);
    const {data:profs}=await sb.from('profiles').select('id,full_name,avatar_url').in('id',oids);
    const pm={};(profs||[]).forEach(p=>pm[p.id]=p);

    list.innerHTML='';
    Object.entries(map).forEach(([oid,lm])=>{
      const pf=pm[oid]||{full_name:'User'};
      const unread=lm.receiver_id===cu.id&&!lm.is_read;
      const div=document.createElement('div');div.className='conv-item';div.dataset.uid=oid;
      const av=pf.avatar_url?`<img src="${pf.avatar_url}" loading="lazy"/>`:pf.full_name?.[0]?.toUpperCase()||'?';
      const lastTxt=lm.content?lm.content.slice(0,38)+(lm.content.length>38?'...':''):(lm.file_url?'📎 File':'');
      div.innerHTML=`
        <div class="c-av">${av}</div>
        <div class="c-info">
          <div class="c-name">${pf.full_name||'User'}</div>
          <div class="c-last" style="color:${unread?'var(--text)':'var(--muted)'};font-weight:${unread?600:400}">${lastTxt||'Say hello 👋'}</div>
        </div>
        <div class="c-meta">
          <div class="c-time">${ago(lm.created_at)}</div>
          ${unread?`<div class="unread-dot"></div>`:''}
        </div>`;
      div.onclick=()=>openChat(oid,pf);
      list.appendChild(div);
    });
  }catch(e){
    list.innerHTML=`<div style="color:var(--muted);text-align:center;padding:1.5rem;font-size:.83rem">${e.message}</div>`;
  }
}

function filterConvs(q){
  document.querySelectorAll('.conv-item').forEach(el=>{
    const n=el.querySelector('.c-name')?.textContent?.toLowerCase()||'';
    el.style.display=n.includes(q.toLowerCase())?'':'none';
  });
}

// ── OPEN CHAT ─────────────────────────────────────────────
async function openChat(uid,prof){
  activeUid=uid;activeProf=prof;
  document.getElementById('chatEmpty').style.display='none';
  const ui=document.getElementById('chatUI');ui.style.display='flex';
  document.getElementById('chatPanel').classList.add('open');
  const av=prof.avatar_url?`<img src="${prof.avatar_url}" loading="lazy"/>`:prof.full_name?.[0]?.toUpperCase()||'?';
  document.getElementById('chAv').innerHTML=av;
  document.getElementById('chName').textContent=prof.full_name||'User';
  document.querySelectorAll('.conv-item').forEach(el=>el.classList.toggle('active',el.dataset.uid===uid));
  await loadMsgs(uid);
  subRealtime(uid);
  markRead(uid);
  // Focus input after short delay
  setTimeout(()=>document.getElementById('msgTa').focus(),300);
}

function closeChat(){
  document.getElementById('chatPanel').classList.remove('open');
  if(dmSub){dmSub.unsubscribe();dmSub=null;}
  activeUid=null;
}

function viewProfile(){}

// ── LOAD MESSAGES ─────────────────────────────────────────
async function loadMsgs(uid){
  const wrap=document.getElementById('msgsWrap');
  wrap.innerHTML='<div style="text-align:center;padding:1.5rem"><div class="mspin"></div></div>';
  try{
    const {data:msgs}=await sb.from('direct_messages')
      .select('*')
      .or(`and(sender_id.eq.${cu.id},receiver_id.eq.${uid}),and(sender_id.eq.${uid},receiver_id.eq.${cu.id})`)
      .order('created_at',{ascending:true}).limit(80);
    wrap.innerHTML='';
    if(!msgs||msgs.length===0){
      wrap.innerHTML='<div style="text-align:center;color:var(--muted);padding:2rem;font-size:.88rem;line-height:1.7">No messages yet.<br/>Say hello! 👋</div>';
      return;
    }
    let lastDate='';
    msgs.forEach(m=>{
      const d=new Date(m.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
      if(d!==lastDate){
        const sep=document.createElement('div');sep.className='date-sep';
        sep.innerHTML=`<span>${d}</span>`;wrap.appendChild(sep);lastDate=d;
      }
      wrap.appendChild(makeBubble(m));
    });
    wrap.scrollTop=wrap.scrollHeight;
  }catch(e){
    wrap.innerHTML=`<div style="color:#ff4d4d;text-align:center;padding:1rem;font-size:.83rem">${e.message}</div>`;
  }
}

function makeBubble(m){
  const mine=m.sender_id===cu.id;
  const row=document.createElement('div');row.className=`row ${mine?'mine':'theirs'}`;row.id='m'+m.id;
  const pf=mine?cp:activeProf;
  const av=pf?.avatar_url?`<img src="${pf.avatar_url}" loading="lazy"/>`:pf?.full_name?.[0]?.toUpperCase()||'?';
  const t=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let cnt='';
  if(m.content)cnt+=`<div class="bubble">${esc(m.content)}</div>`;
  if(m.file_url){
    if(m.file_type?.startsWith('image/')){
      cnt+=`<img class="m-img" src="${m.file_url}" onclick="window.open('${m.file_url}','_blank')" loading="lazy"/>`;
    }else{
      const fn=decodeURIComponent(m.file_url.split('/').pop()).replace(/^\d+_/,'').slice(0,28);
      cnt+=`<a class="m-file" href="${m.file_url}" target="_blank">📎 ${fn}</a>`;
    }
  }
  row.innerHTML=`<div class="r-av">${av}</div><div class="r-wrap">${cnt}<div class="r-time">${t}${mine?' ✓':''}</div></div>`;
  return row;
}

// ── SEND ──────────────────────────────────────────────────
async function sendMsg(){
  const ta=document.getElementById('msgTa');
  const txt=ta.value.trim();
  if(!txt&&!attached)return;
  const btn=document.getElementById('sendBtn');btn.disabled=true;
  try{
    let fUrl=null,fType=null;
    if(attached){
      const r=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fileBase64:attached.base64,fileName:attached.name,folder:`dms/${cu.id}`,contentType:attached.type})});
      const d=await r.json();
      if(d.success){fUrl=d.url;fType=attached.type;}
      clearAttach();
    }
    const {data:msg,error}=await sb.from('direct_messages').insert({
      sender_id:cu.id,receiver_id:activeUid,
      content:txt||null,file_url:fUrl,file_type:fType,is_read:false
    }).select().single();
    if(error)throw error;
    ta.value='';ta.style.height='auto';
    const wrap=document.getElementById('msgsWrap');
    const empty=wrap.querySelector('div[style*="Say hello"]');
    if(empty)empty.remove();
    wrap.appendChild(makeBubble(msg));
    wrap.scrollTop=wrap.scrollHeight;
    loadConvList();
  }catch(e){alert('Error: '+e.message);}
  finally{btn.disabled=false;}
}

// ── REALTIME ──────────────────────────────────────────────
function subRealtime(uid){
  if(dmSub)dmSub.unsubscribe();
  dmSub=sb.channel('cc-'+cu.id+'-'+uid)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'direct_messages'},p=>{
      const m=p.new;
      const ok=(m.sender_id===uid&&m.receiver_id===cu.id)||(m.sender_id===cu.id&&m.receiver_id===uid);
      if(ok&&!document.getElementById('m'+m.id)){
        const wrap=document.getElementById('msgsWrap');
        const empty=wrap.querySelector('div[style*="Say hello"]');
        if(empty)empty.remove();
        wrap.appendChild(makeBubble(m));
        wrap.scrollTop=wrap.scrollHeight;
        if(m.sender_id===uid)markRead(uid);
        loadConvList();
      }
    }).subscribe();
}

async function markRead(uid){
  await sb.from('direct_messages').update({is_read:true}).eq('sender_id',uid).eq('receiver_id',cu.id).eq('is_read',false);
}

// ── ATTACH FILE ───────────────────────────────────────────
function attachFile(inp,isCamera){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    attached={base64:e.target.result,name:f.name,type:f.type};
    const prev=document.getElementById('attachPrev');prev.innerHTML='';
    const div=document.createElement('div');div.className='a-thumb';
    if(f.type.startsWith('image/')){
      div.innerHTML=`<img src="${e.target.result}"/><button class="a-rm" onclick="clearAttach()">✕</button>`;
    }else{
      div.style.cssText='width:auto;height:auto;border-radius:8px;padding:.3rem .6rem;background:rgba(255,107,157,.1);border:1px solid rgba(255,107,157,.2);font-size:.77rem;display:flex;align-items:center;gap:.3rem;';
      div.innerHTML=`📎 ${f.name.slice(0,20)}<button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem" onclick="clearAttach()">✕</button>`;
    }
    prev.appendChild(div);
    // Auto focus after attach
    document.getElementById('msgTa').focus();
  };
  r.readAsDataURL(f);inp.value='';
}
function clearAttach(){attached=null;document.getElementById('attachPrev').innerHTML='';}

// ── NEW DM MODAL ──────────────────────────────────────────
function openNewDM(){
  document.getElementById('newDMModal').classList.add('open');
  renderPpl(allPpl);
}
function closeNewDM(){document.getElementById('newDMModal').classList.remove('open');}
function renderPpl(ppl){
  const list=document.getElementById('pplList');
  if(!ppl||!ppl.length){
    list.innerHTML='<div style="color:var(--muted);text-align:center;padding:1.5rem;font-size:.85rem;line-height:1.7">No friends yet!<br/>Follow people on Social page first. 📸</div>';
    return;
  }
  list.innerHTML='';
  ppl.forEach(p=>{
    const div=document.createElement('div');div.className='u-item';
    const av=p.avatar_url?`<img src="${p.avatar_url}" loading="lazy"/>`:p.full_name?.[0]?.toUpperCase()||'?';
    div.innerHTML=`
      <div class="u-av">${av}</div>
      <div>
        <div class="u-name">${p.full_name||'User'}</div>
        <div class="u-sub">Tap to start chatting 💬</div>
      </div>`;
    div.onclick=()=>{closeNewDM();openChat(p.id,p);};
    list.appendChild(div);
  });
}
function searchPpl(q){renderPpl(q?allPpl.filter(p=>(p.full_name||'').toLowerCase().includes(q.toLowerCase())):allPpl);}
document.getElementById('newDMModal').onclick=e=>{if(e.target===document.getElementById('newDMModal'))closeNewDM();};

// ── HELPERS ───────────────────────────────────────────────
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');}
function ago(d){
  const s=(Date.now()-new Date(d))/1000;
  if(s<60)return 'now';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';
  return new Date(d).toLocaleDateString([],{month:'short',day:'numeric'});
}
