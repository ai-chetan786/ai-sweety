<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Profile — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api/config.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--dark2:#12121a;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;--success:#4dff91;--error:#ff4d4d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.topnav{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;background:rgba(10,10,15,.8);}
.logo{display:flex;align-items:center;gap:.6rem;font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;-webkit-text-fill-color:initial;}
.nav-links{display:flex;gap:.5rem;}
.nav-link{padding:.5rem 1rem;border-radius:50px;font-size:.85rem;text-decoration:none;color:var(--muted);transition:.2s;}
.nav-link:hover,.nav-link.active{color:var(--pink);}
.page{max-width:760px;margin:0 auto;padding:2rem 1.5rem;}
/* Cover */
.cover-wrap{position:relative;height:180px;border-radius:20px;overflow:hidden;margin-bottom:70px;background:linear-gradient(135deg,rgba(255,107,157,.3),rgba(168,85,247,.3));}
.cover-img{width:100%;height:100%;object-fit:cover;}
.cover-edit{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);border:none;color:#fff;padding:.4rem .8rem;border-radius:8px;cursor:pointer;font-size:.8rem;backdrop-filter:blur(4px);}
.avatar-wrap{position:absolute;bottom:-50px;left:1.5rem;}
.avatar{width:100px;height:100px;border-radius:50%;border:4px solid var(--dark);background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden;cursor:pointer;position:relative;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;border-radius:50%;}
.avatar:hover .avatar-edit{display:flex;}
.profile-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;}
.profile-info h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:.2rem;}
.profile-info .handle{color:var(--muted);font-size:.88rem;}
.profile-info .bio-text{color:var(--text);font-size:.9rem;line-height:1.6;margin-top:.5rem;max-width:400px;}
.stats-row{display:flex;gap:1.5rem;margin-top:.8rem;}
.stat{text-align:center;}
.stat .num{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
.stat .label{font-size:.75rem;color:var(--muted);}
.edit-btn{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;padding:.6rem 1.4rem;border-radius:50px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s;}
.edit-btn:hover{transform:translateY(-2px);}
/* Tabs */
.tabs{display:flex;gap:.3rem;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:1.5rem;}
.tab{padding:.7rem 1.2rem;font-size:.88rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s;}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);}
/* Grid */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.post-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;background:var(--card);}
.post-thumb img{width:100%;height:100%;object-fit:cover;}
.post-thumb .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;gap:1rem;font-size:.85rem;}
.post-thumb:hover .overlay{display:flex;}
/* Edit Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:1.5rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.5rem;}
.form-group{margin-bottom:1.1rem;}
label{display:block;font-size:.82rem;font-weight:500;color:var(--muted);margin-bottom:.4rem;}
input,textarea,select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.8rem 1rem;color:var(--text);font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:.2s;}
input:focus,textarea:focus,select:focus{border-color:var(--pink);}
input::placeholder,textarea::placeholder{color:var(--muted);}
textarea{resize:vertical;min-height:80px;}
.modal-actions{display:flex;gap:.8rem;margin-top:1.5rem;}
.btn{flex:1;padding:.85rem;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:.2s;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);}
.alert{padding:.8rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none;}
.alert.success{background:rgba(77,255,145,.1);border:1px solid rgba(77,255,145,.3);color:var(--success);}
.alert.error{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:var(--error);}
#coverInput,#avatarInput{display:none;}
</style>
</head>
<body>
<nav class="topnav">
  <a href="index.html" class="logo"><div class="logo-icon">🌸</div>AI Sweety</a>
  <div class="nav-links">
    <a href="chat.html" class="nav-link">💬 Chat</a>
    <a href="social.html" class="nav-link">📸 Social</a>
    <a href="profile.html" class="nav-link active">👤 Profile</a>
  </div>
</nav>

<div class="page">
  <!-- Cover -->
  <div class="cover-wrap" id="coverWrap">
    <img id="coverImg" src="" alt="" style="display:none"/>
    <button class="cover-edit" onclick="document.getElementById('coverInput').click()">📷 Edit Cover</button>
    <div class="avatar-wrap">
      <div class="avatar" onclick="document.getElementById('avatarInput').click()">
        <span id="avatarEmoji">🌸</span>
        <img id="avatarImg" src="" style="display:none"/>
        <div class="avatar-edit">📷</div>
      </div>
    </div>
  </div>
  <input type="file" id="coverInput" accept="image/*" onchange="uploadCover(this)"/>
  <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this)"/>

  <!-- Profile info -->
  <div class="profile-header">
    <div class="profile-info">
      <h1 id="profileName">Loading...</h1>
      <div class="handle" id="profileHandle">@sweety_user</div>
      <div class="bio-text" id="profileBio">No bio yet. Click Edit Profile to add one.</div>
      <div class="stats-row">
        <div class="stat"><div class="num" id="statPosts">0</div><div class="label">Posts</div></div>
        <div class="stat"><div class="num" id="statFollowers">0</div><div class="label">Followers</div></div>
        <div class="stat"><div class="num" id="statFollowing">0</div><div class="label">Following</div></div>
      </div>
    </div>
    <button class="edit-btn" onclick="openEditModal()">✏️ Edit Profile</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('posts',this)">📷 Posts</div>
    <div class="tab" onclick="switchTab('reels',this)">🎬 Reels</div>
    <div class="tab" onclick="switchTab('saved',this)">🔖 Saved</div>
  </div>

  <div id="postsTab">
    <div class="posts-grid" id="postsGrid">
      <!-- Posts loaded dynamically -->
      <div class="post-thumb" style="background:linear-gradient(135deg,rgba(255,107,157,.2),rgba(168,85,247,.2));display:flex;align-items:center;justify-content:center;font-size:2rem;">🌸</div>
      <div class="post-thumb" style="background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(0,200,255,.2));display:flex;align-items:center;justify-content:center;font-size:2rem;">🎨</div>
      <div class="post-thumb" style="background:linear-gradient(135deg,rgba(255,200,0,.2),rgba(255,107,157,.2));display:flex;align-items:center;justify-content:center;font-size:2rem;">✨</div>
    </div>
  </div>
  <div id="reelsTab" style="display:none;text-align:center;padding:3rem;color:var(--muted);">No reels yet. Share your first reel!</div>
  <div id="savedTab" style="display:none;text-align:center;padding:3rem;color:var(--muted);">No saved posts yet.</div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Profile</h3>
    <div class="alert success" id="saveSuccess">Profile saved! 🌸</div>
    <div class="alert error" id="saveError"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="editName" placeholder="Your name"/></div>
    <div class="form-group"><label>Username</label><input type="text" id="editUsername" placeholder="@username"/></div>
    <div class="form-group"><label>Bio</label><textarea id="editBio" placeholder="Tell the world about yourself..." rows="3"></textarea></div>
    <div class="form-group"><label>Date of Birth</label><input type="date" id="editDob"/></div>
    <div class="form-group"><label>Mobile Number</label><input type="tel" id="editMobile" placeholder="+91 9876543210"/></div>
    <div class="form-group">
      <label>Preferred Language</label>
      <select id="editLang">
        <option value="en">English</option><option value="hi">हिंदी</option><option value="ta">தமிழ்</option>
        <option value="te">తెలుగు</option><option value="kn">ಕನ್ನಡ</option><option value="ml">മലയാളം</option>
        <option value="mr">मराठी</option><option value="bn">বাংলা</option><option value="fr">Français</option>
        <option value="es">Español</option><option value="ar">العربية</option><option value="zh">中文</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProfile()">💾 Save Profile</button>
    </div>
  </div>
</div>

<script>
let currentUser=null;

(async()=>{
  const sb=getSupabase();
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  currentUser=session.user;
  await loadProfile();
})();

async function loadProfile(){
  const sb=getSupabase();
  const {data:profile}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(profile){
    document.getElementById('profileName').textContent=profile.full_name||'Sweety User';
    document.getElementById('profileHandle').textContent='@'+(profile.username||profile.email?.split('@')[0]||'user');
    document.getElementById('profileBio').textContent=profile.bio||'No bio yet. Click Edit Profile to add one.';
    if(profile.avatar_url){document.getElementById('avatarImg').src=profile.avatar_url;document.getElementById('avatarImg').style.display='block';document.getElementById('avatarEmoji').style.display='none';}
    if(profile.cover_url){document.getElementById('coverImg').src=profile.cover_url;document.getElementById('coverImg').style.display='block';}
    document.getElementById('statFollowers').textContent=profile.followers_count||0;
    document.getElementById('statFollowing').textContent=profile.following_count||0;
    // prefill edit form
    document.getElementById('editName').value=profile.full_name||'';
    document.getElementById('editUsername').value=profile.username||'';
    document.getElementById('editBio').value=profile.bio||'';
    document.getElementById('editDob').value=profile.dob||'';
    document.getElementById('editMobile').value=profile.mobile||'';
    document.getElementById('editLang').value=profile.preferred_lang||'en';
  }
}

async function saveProfile(){
  const sb=getSupabase();
  const updates={
    full_name:document.getElementById('editName').value,
    username:document.getElementById('editUsername').value.replace('@',''),
    bio:document.getElementById('editBio').value,
    dob:document.getElementById('editDob').value,
    mobile:document.getElementById('editMobile').value,
    preferred_lang:document.getElementById('editLang').value,
    updated_at:new Date().toISOString()
  };
  const {error}=await sb.from('profiles').update(updates).eq('id',currentUser.id);
  if(error){
    document.getElementById('saveError').textContent=error.message;document.getElementById('saveError').style.display='block';
  }else{
    document.getElementById('saveSuccess').style.display='block';
    await loadProfile();
    setTimeout(()=>{closeEditModal();document.getElementById('saveSuccess').style.display='none';},2000);
  }
}

async function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  const sb=getSupabase();
  const path=`avatars/${currentUser.id}/${Date.now()}.${file.name.split('.').pop()}`;
  const {error}=await sb.storage.from('sweety-media').upload(path,file,{upsert:true});
  if(!error){
    const {data}=sb.storage.from('sweety-media').getPublicUrl(path);
    await sb.from('profiles').update({avatar_url:data.publicUrl}).eq('id',currentUser.id);
    document.getElementById('avatarImg').src=data.publicUrl;
    document.getElementById('avatarImg').style.display='block';
    document.getElementById('avatarEmoji').style.display='none';
  }
}

async function uploadCover(input){
  const file=input.files[0];if(!file)return;
  const sb=getSupabase();
  const path=`covers/${currentUser.id}/${Date.now()}.${file.name.split('.').pop()}`;
  const {error}=await sb.storage.from('sweety-media').upload(path,file,{upsert:true});
  if(!error){
    const {data}=sb.storage.from('sweety-media').getPublicUrl(path);
    await sb.from('profiles').update({cover_url:data.publicUrl}).eq('id',currentUser.id);
    document.getElementById('coverImg').src=data.publicUrl;
    document.getElementById('coverImg').style.display='block';
  }
}

function openEditModal(){document.getElementById('editModal').classList.add('open');}
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['postsTab','reelsTab','savedTab'].forEach(t=>{document.getElementById(t).style.display='none';});
  document.getElementById(tab+'Tab').style.display='block';
}
document.getElementById('editModal').onclick=function(e){if(e.target===this)closeEditModal();};
</script>
</body></html>
