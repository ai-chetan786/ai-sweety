<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — AI Sweety</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api/config.js"></script>
<style>
:root{--pink:#ff6b9d;--purple:#a855f7;--dark:#0a0a0f;--dark2:#12121a;--card:#16213e;--text:#f0f0ff;--muted:#8888aa;--error:#ff4d4d;--success:#4dff91;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);}
.orb1{width:350px;height:350px;background:rgba(168,85,247,.2);top:-80px;right:-80px;}
.orb2{width:300px;height:300px;background:rgba(255,107,157,.15);bottom:-60px;left:-60px;}
.container{width:100%;max-width:440px;position:relative;z-index:1;}
.logo-link{display:flex;align-items:center;gap:.6rem;text-decoration:none;justify-content:center;margin-bottom:2rem;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:2.5rem;}
.card h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:.4rem;}
.card .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.2rem;}
label{display:block;font-size:.85rem;font-weight:500;color:var(--muted);margin-bottom:.5rem;}
.input-icon{position:relative;}
.input-icon input{padding-left:2.8rem;width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.85rem 1rem .85rem 2.8rem;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;transition:all .2s;outline:none;}
.input-icon input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,.15);}
.input-icon input::placeholder{color:var(--muted);}
.input-icon .icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}
.password-wrap{position:relative;}
.password-wrap input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.85rem 3rem .85rem 1rem;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;transition:all .2s;outline:none;}
.password-wrap input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,.15);}
.password-wrap input::placeholder{color:var(--muted);}
.toggle-pw{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--muted);}
.forgot-link{text-align:right;margin-top:.4rem;}<br>
.forgot-link a{color:var(--pink);font-size:.82rem;text-decoration:none;}
.btn{width:100%;padding:.95rem;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;border:none;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,157,.4);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.register-link{text-align:center;margin-top:1.2rem;font-size:.9rem;color:var(--muted);}
.register-link a{color:var(--pink);text-decoration:none;font-weight:600;}
.alert{padding:.9rem 1rem;border-radius:10px;font-size:.88rem;margin-bottom:1rem;display:none;}
.alert.error{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:var(--error);}
.alert.success{background:rgba(77,255,145,.1);border:1px solid rgba(77,255,145,.3);color:var(--success);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.welcome-back{text-align:center;font-size:2rem;margin-bottom:.5rem;}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="container">
  <a href="index.html" class="logo-link"><div class="logo-icon">🌸</div><span class="logo-text">AI Sweety</span></a>
  <div class="card">
    <div class="welcome-back">👋</div>
    <h2>Welcome Back!</h2>
    <p class="subtitle">Sign in to continue with Sweety 🌸</p>
    <div class="alert error" id="errorMsg"></div>
    <div class="alert success" id="successMsg"></div>
    <div class="form-group">
      <label>Gmail Address</label>
      <div class="input-icon"><span class="icon">📧</span><input type="email" id="email" placeholder="you@gmail.com" autocomplete="email"/></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
        <button class="toggle-pw" onclick="togglePw()" type="button">👁️</button>
      </div>
      <div class="forgot-link"><a href="forgot-password.html">Forgot password?</a></div>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="login()">🌸 Sign In</button>
    <div class="register-link">New here? <a href="register.html">Create free account →</a></div>
  </div>
</div>
<script>
function togglePw(){const i=document.getElementById('password');i.type=i.type==='password'?'text':'password';}
function showAlert(type,msg){
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('successMsg').style.display='none';
  const el=document.getElementById(type==='error'?'errorMsg':'successMsg');
  el.textContent=msg;el.style.display='block';
}
async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){return showAlert('error','Please enter your email and password.');}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Signing in...';
  try{
    const sb=getSupabase();
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)throw error;
    showAlert('success','Welcome back! Redirecting to Sweety... 🌸');
    setTimeout(()=>window.location.href='chat.html',1500);
  }catch(err){
    showAlert('error',err.message||'Login failed. Check your credentials.');
  }finally{btn.disabled=false;btn.innerHTML='🌸 Sign In';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
// Auto-redirect if already logged in
(async()=>{
  const sb=getSupabase();
  const {data:{session}}=await sb.auth.getSession();
  if(session)window.location.href='chat.html';
})();
</script>
</body></html>
